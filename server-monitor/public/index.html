<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Chico Monitor</p>
          <h1>Server dashboard</h1>
          <p id="headline" class="muted">Loading live system snapshot...</p>
        </div>
        <div class="topbar-actions">
          <button id="refreshButton" class="button">Refresh</button>
          <div class="stamp">
            <span>Updated</span>
            <strong id="updatedAt">...</strong>
          </div>
        </div>
      </header>

      <section id="alertStrip" class="alert-strip"></section>

      <section class="grid cards-6" id="overviewCards"></section>

      <section class="grid details-grid">
        <article class="panel span-2">
          <div class="panel-header">
            <h2>Security</h2>
            <span id="securityMeta" class="pill">...</span>
          </div>
          <div id="securityList" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Network</h2>
            <span class="pill">Live</span>
          </div>
          <div id="networkDetails" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>OpenClaw</h2>
            <span class="pill">Gateway</span>
          </div>
          <div id="openclawDetails" class="stack"></div>
        </article>

        <article class="panel span-2">
          <div class="panel-header">
            <h2>Listening ports</h2>
            <span id="portsMeta" class="pill">...</span>
          </div>
          <div id="portsTable"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Top CPU</h2>
            <span class="pill">Processes</span>
          </div>
          <div id="processList" class="stack"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Storage</h2>
            <span class="pill">Volumes</span>
          </div>
          <div id="storageList" class="stack"></div>
        </article>

        <article class="panel span-2">
          <div class="panel-header">
            <h2>Recent auth anomalies</h2>
            <span class="pill">SSH / auth.log</span>
          </div>
          <div id="authList" class="stack small"></div>
        </article>

        <article class="panel span-2">
          <div class="panel-header">
            <h2>System errors</h2>
            <span class="pill">journalctl</span>
          </div>
          <div id="errorList" class="stack small"></div>
        </article>
      </section>
    </div>

    <template id="metricCardTemplate">
      <article class="metric-card">
        <p class="metric-label"></p>
        <h3 class="metric-value"></h3>
        <p class="metric-note muted"></p>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
